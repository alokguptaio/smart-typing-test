<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Smart Typing Test</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#efe3db;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:#fdf8f5;border-radius:28px;box-shadow:0 24px 64px rgba(100,55,25,.12);width:100%;max-width:500px;padding:52px 48px 44px;}
.card h1{font-family:'Playfair Display',serif;font-size:2rem;color:#1e1208;margin-bottom:8px;}
.subtitle{font-size:.88rem;color:#7a6558;margin-bottom:30px;}
.messages{margin-bottom:16px;}
.msg{padding:10px 16px;border-radius:10px;font-size:.84rem;font-weight:500;margin-bottom:8px;}
.msg.error{background:#fdecea;color:#c0392b;border:1px solid #f5c6c3;}
.msg.success{background:#edfaf1;color:#1e8449;border:1px solid #b7e4c7;}
.field{position:relative;margin-bottom:20px;}
.field label{position:absolute;top:-10px;left:20px;background:#fdf8f5;padding:0 6px;font-size:.74rem;font-weight:600;color:#2b1e14;z-index:1;}
.input-wrap{display:flex;align-items:center;border:1.5px solid #ddd0c8;border-radius:50px;padding:0 20px;height:56px;gap:12px;transition:border-color .2s;}
.input-wrap:focus-within{border-color:#e8a880;}
.input-wrap input{border:none;outline:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:.92rem;color:#2b1e14;width:100%;}
.input-wrap input::placeholder{color:#c0ada5;}
.eye-btn{background:none;border:none;cursor:pointer;padding:4px;color:#c0ada5;display:flex;align-items:center;}
.eye-btn:hover{color:#7a6558;}
.btn-primary{display:block;width:100%;height:56px;border:none;border-radius:50px;background:#f2c4a8;color:#b85520;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s;margin-bottom:20px;}
.btn-primary:hover{background:#e8a882;}
.switch-text{text-align:center;font-size:.84rem;color:#7a6558;}
.switch-text a{font-weight:700;color:#c0622a;text-decoration:none;}
@media(max-width:480px){.card{padding:36px 22px 30px;}.card h1{font-size:1.7rem;}}
</style>
</head>
<body>
<div class="card">
  <h1>Set New Password</h1>
  <p class="subtitle">Enter a strong password with at least 6 characters.</p>

  {% if messages %}
  <div class="messages">
    {% for message in messages %}
    <div class="msg {% if message.tags == 'error' %}error{% else %}success{% endif %}">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}

<form method="POST" action="/reset-password/{{ token }}/">
    {% csrf_token %}
    <div class="field">
      <label>New Password</label>
      <div class="input-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#b8a49a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" id="pw1" name="password" placeholder="Enter new password" required>
        <button type="button" class="eye-btn" onclick="toggle('pw1','e1')">
          <svg id="e1" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="field">
      <label>Confirm Password</label>
      <div class="input-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#b8a49a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" id="pw2" name="confirm_password" placeholder="Re-enter new password" required>
        <button type="button" class="eye-btn" onclick="toggle('pw2','e2')">
          <svg id="e2" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button type="submit" class="btn-primary">Update Password ✓</button>
  </form>

  <p class="switch-text"><a href="{% url 'login' %}">←Back to Login</a></p>
</div>

<script>
function toggle(inputId, iconId){
  const inp = document.getElementById(inputId);
  const ico = document.getElementById(iconId);
  if(inp.type === 'password'){
    inp.type = 'text';
    ico.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;
  } else {
    inp.type = 'password';
    ico.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  }
}
</script>
</body>
</html>
