<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — Smart Typing Test</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#efe3db;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:#fdf8f5;border-radius:28px;box-shadow:0 24px 64px rgba(100,55,25,.12);width:100%;max-width:500px;padding:52px 48px 44px;}
.card h1{font-family:'Playfair Display',serif;font-size:2rem;color:#1e1208;margin-bottom:8px;}
.subtitle{font-size:.88rem;color:#7a6558;margin-bottom:30px;line-height:1.6;}
.messages{margin-bottom:16px;}
.msg{padding:10px 16px;border-radius:10px;font-size:.84rem;font-weight:500;margin-bottom:8px;}
.msg.error{background:#fdecea;color:#c0392b;border:1px solid #f5c6c3;}
.msg.success{background:#edfaf1;color:#1e8449;border:1px solid #b7e4c7;}
.field{position:relative;margin-bottom:20px;}
.field label{position:absolute;top:-10px;left:20px;background:#fdf8f5;padding:0 6px;font-size:.74rem;font-weight:600;color:#2b1e14;z-index:1;}
.input-wrap{display:flex;align-items:center;border:1.5px solid #ddd0c8;border-radius:50px;padding:0 20px;height:56px;gap:12px;transition:border-color .2s;}
.input-wrap:focus-within{border-color:#e8a880;}
.input-wrap input{border:none;outline:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:.92rem;color:#2b1e14;width:100%;}
.input-wrap input::placeholder{color:#c0ada5;}
.btn-primary{display:block;width:100%;height:56px;border:none;border-radius:50px;background:#f2c4a8;color:#b85520;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s;margin-bottom:20px;}
.btn-primary:hover{background:#e8a882;}
.switch-text{text-align:center;font-size:.84rem;color:#7a6558;}
.switch-text a{font-weight:700;color:#c0622a;text-decoration:none;}
.switch-text a:hover{text-decoration:underline;}
@media(max-width:480px){.card{padding:36px 22px 30px;}.card h1{font-size:1.7rem;}}
</style>
</head>
<body>
<div class="card">
  <h1>Forgot Password?</h1>
  <p class="subtitle">Enter your registered email and we'll send you a reset link.</p>

  {% if messages %}
  <div class="messages">
    {% for message in messages %}
    <div class="msg {% if message.tags == 'error' %}error{% else %}success{% endif %}">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}

  <form method="POST" action="{% url 'forgot_password' %}">
    {% csrf_token %}
    <div class="field">
      <label>Email</label>
      <div class="input-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#b8a49a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 7L2 7"/>
        </svg>
        <input type="email" name="email" placeholder="aapka@email.com" required>
      </div>
    </div>
    <button type="submit" class="btn-primary">Send Reset Link </button>
  </form>

  <p class="switch-text"><a href="{% url 'login' %}">← Back to Login</a></p>
</div>
</body>
</html>
